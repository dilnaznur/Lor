<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | MediSlot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <nav class="nav" id="nav"></nav>
    <main class="container">
      <form class="form card" id="registerForm">
        <h2>Создать аккаунт</h2>
        <div class="field">
          <label for="name">Имя</label>
          <input id="name" type="text" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" required>
        </div>
        <div class="field">
          <label for="password">Пароль (минимум 6 символов)</label>
          <input id="password" type="password" minlength="6" required>
        </div>
        <div class="field">
          <label for="role">Роль</label>
          <select id="role" required>
            <option value="patient">Пациент</option>
            <option value="doctor">Специалист</option>
          </select>
        </div>

        <div id="doctorFields" style="display:none;">
          <div class="field">
            <label for="specialization">Специализация</label>
            <input id="specialization" type="text" value="ЛОР" readonly>
          </div>
          <div class="field">
            <label for="description">Короткое описание</label>
            <textarea id="description" rows="3" placeholder="Например: опыт 5 лет, приём взрослых и детей" required></textarea>
          </div>
          <div class="field">
            <label for="avatarFile">Фото (файл с компьютера)</label>
            <input id="avatarFile" type="file" accept="image/*">
            <div class="muted" style="font-size:0.9rem;">Файл загрузится в Supabase Storage при регистрации, если доступна сессия. Иначе используйте ссылку ниже.</div>
          </div>
          <div class="field">
            <label for="avatarUrl">Или ссылка на фото (https://...)</label>
            <input id="avatarUrl" type="url" placeholder="https://...">
          </div>
        </div>
        <button class="btn btn-primary" type="submit">Зарегистрироваться</button>
      </form>
    </main>
    <script type="module" src="js/pages/register.js"></script>
  </body>
</html>
