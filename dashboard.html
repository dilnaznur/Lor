<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель пользователя | MediSlot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <nav class="nav" id="nav"></nav>
    <main class="container">
      <h1>Личный кабинет</h1>
      <section id="profileBlock"></section>

      <section class="kpi">
        <div class="card"><div class="muted">Ожидают</div><div id="statPending" class="num">0</div></div>
        <div class="card"><div class="muted">Подтверждены</div><div id="statConfirmed" class="num">0</div></div>
        <div class="card"><div class="muted">Отменены</div><div id="statCancelled" class="num">0</div></div>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Врач</th>
              <th>Направление</th>
              <th>Дата</th>
              <th>Время</th>
              <th>Статус</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="appointmentsTable"></tbody>
        </table>
      </section>
    </main>
    <script type="module" src="js/pages/dashboard.js"></script>
  </body>
</html>
