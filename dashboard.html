<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель пользователя | MediSlot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <nav class="nav" id="nav"></nav>
    <main class="container">
      <h1>Личный кабинет</h1>
      <section id="profileBlock"></section>

      <section class="kpi">
        <div class="card"><div class="muted">Ожидают</div><div id="statPending" class="num">0</div></div>
        <div class="card"><div class="muted">Подтверждены</div><div id="statConfirmed" class="num">0</div></div>
        <div class="card"><div class="muted">Отменены</div><div id="statCancelled" class="num">0</div></div>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Врач</th>
              <th>Направление</th>
              <th>Дата</th>
              <th>Время</th>
              <th>Статус</th>
              <th>Действия</th>
              <th>Отзыв</th>
            </tr>
          </thead>
          <tbody id="appointmentsTable"></tbody>
        </table>
      </section>

      <section id="reviewSection" class="card" style="margin-top:16px; display:none;">
        <h3 style="margin-top:0;">Отзыв</h3>
        <p class="muted" id="reviewDoctorLine" style="margin-top:0;"></p>

        <form id="reviewForm" class="grid" style="gap:12px;">
          <input type="hidden" id="reviewDoctorId">

          <div class="field">
            <label for="reviewRating">Оценка</label>
            <select id="reviewRating" required>
              <option value="5">5</option>
              <option value="4">4</option>
              <option value="3">3</option>
              <option value="2">2</option>
              <option value="1">1</option>
            </select>
          </div>

          <div class="field">
            <label for="reviewComment">Комментарий</label>
            <textarea id="reviewComment" rows="3" placeholder="Коротко опишите впечатление"></textarea>
          </div>

          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn btn-primary" type="submit">Сохранить отзыв</button>
            <button class="btn btn-secondary" type="button" id="reviewCancelBtn">Отмена</button>
          </div>
        </form>
      </section>
    </main>
    <script type="module" src="js/pages/dashboard.js"></script>
  </body>
</html>
